basePath: /
definitions:
  handler.ExportItem:
    properties:
      age:
        type: integer
      amount:
        type: number
      name:
        type: string
    type: object
  model.Response-any:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
      success:
        type: boolean
    required:
    - code
    - data
    - msg
    - success
    type: object
  model.Response-array_array_string:
    properties:
      code:
        type: integer
      data:
        items:
          items:
            type: string
          type: array
        type: array
      msg:
        type: string
      success:
        type: boolean
    required:
    - code
    - data
    - msg
    - success
    type: object
  model.Response-array_service_TreeNodeDTO:
    properties:
      code:
        type: integer
      data:
        items:
          $ref: '#/definitions/service.TreeNodeDTO'
        type: array
      msg:
        type: string
      success:
        type: boolean
    required:
    - code
    - data
    - msg
    - success
    type: object
  model.Response-bool:
    properties:
      code:
        type: integer
      data:
        type: boolean
      msg:
        type: string
      success:
        type: boolean
    required:
    - code
    - data
    - msg
    - success
    type: object
  model.Response-service_PostAiClassificationResult:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/service.PostAiClassificationResult'
      msg:
        type: string
      success:
        type: boolean
    required:
    - code
    - data
    - msg
    - success
    type: object
  service.AiClassificationItem:
    properties:
      firstLevelClassificationId:
        type: integer
      firstLevelClassificationName:
        type: string
      secondLevelClassificationId:
        type: integer
      secondLevelClassificationName:
        type: string
    type: object
  service.PostAiClassificationRequest:
    properties:
      data:
        type: string
    required:
    - data
    type: object
  service.PostAiClassificationResponse:
    properties:
      classifications:
        items:
          $ref: '#/definitions/service.AiClassificationItem'
        type: array
      message:
        type: string
    type: object
  service.PostAiClassificationResult:
    properties:
      arkRes:
        type: object
      arkTextObj:
        $ref: '#/definitions/service.PostAiClassificationResponse'
    type: object
  service.TreeNodeDTO:
    properties:
      children:
        items:
          $ref: '#/definitions/service.TreeNodeDTO'
        type: array
      id:
        type: integer
      name:
        type: string
    required:
    - id
    - name
    type: object
  service.UpdateTreeRequest:
    properties:
      tree:
        items:
          $ref: '#/definitions/service.TreeNodeDTO'
        type: array
    required:
    - tree
    type: object
host: localhost:5200
info:
  contact:
    email: your-email@example.com
    name: API Support
  description: 账本管理系统的后端 API 接口文档
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: 账本系统 API
  version: "1.0"
paths:
  /ai/ai-classification:
    post:
      consumes:
      - application/json
      description: 根据支付宝账单数据，调用AI自动匹配支出/收入分类
      parameters:
      - description: 账单数据
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.PostAiClassificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 分类结果
          schema:
            $ref: '#/definitions/model.Response-service_PostAiClassificationResult'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/model.Response-any'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/model.Response-any'
      summary: AI智能分类账单
      tags:
      - AI
  /classification:
    get:
      consumes:
      - application/json
      description: 获取所有支出分类，按树形结构返回
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回分类树
          schema:
            $ref: '#/definitions/model.Response-array_service_TreeNodeDTO'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/model.Response-any'
      summary: 获取支出分类树
      tags:
      - 支出分类
    put:
      consumes:
      - application/json
      description: 替换数据库中的所有支出分类数据，前端传入完整的树结构
      parameters:
      - description: 分类树数据
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.UpdateTreeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/model.Response-bool'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/model.Response-any'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/model.Response-any'
      summary: 更新整个支出分类树
      tags:
      - 支出分类
  /export:
    post:
      consumes:
      - application/json
      description: 接收 JSON 数组，生成并以附件形式下载 Excel 文件
      parameters:
      - description: 导出数据列表
        in: body
        name: body
        required: true
        schema:
          items:
            $ref: '#/definitions/handler.ExportItem'
          type: array
      produces:
      - application/octet-stream
      responses:
        "200":
          description: Excel 文件（.xlsx）
          schema:
            type: file
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/model.Response-bool'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/model.Response-bool'
      summary: 导出 Excel
      tags:
      - 导出
  /income-classification:
    get:
      consumes:
      - application/json
      description: 获取所有收入分类，按树形结构返回
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回分类树
          schema:
            $ref: '#/definitions/model.Response-array_service_TreeNodeDTO'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/model.Response-any'
      summary: 获取收入分类树
      tags:
      - 收入分类
    put:
      consumes:
      - application/json
      description: 替换数据库中的所有收入分类数据，前端传入完整的树结构
      parameters:
      - description: 分类树数据
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.UpdateTreeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/model.Response-bool'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/model.Response-any'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/model.Response-any'
      summary: 更新整个收入分类树
      tags:
      - 收入分类
  /upload:
    post:
      consumes:
      - multipart/form-data
      description: 上传 GB2312/GBK 编码的 CSV 文件，自动转码后解析并返回数据行列表
      parameters:
      - description: CSV 文件（GB2312 编码）
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: 解析后的数据行列表
          schema:
            $ref: '#/definitions/model.Response-array_array_string'
        "400":
          description: 文件获取或解析失败
          schema:
            $ref: '#/definitions/model.Response-bool'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/model.Response-bool'
      summary: 上传 CSV 文件（GB2312 编码）
      tags:
      - 上传
schemes:
- http
- https
swagger: "2.0"
